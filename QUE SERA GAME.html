<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

html, body {
  width: 100%; min-height: 100vh;
  background: #e4d9be;
}

.paper {
  background-color: #e4d9be;
  background-image:
    radial-gradient(ellipse at 18% 25%, rgba(170,130,60,0.13) 0%, transparent 52%),
    radial-gradient(ellipse at 82% 72%, rgba(150,110,50,0.10) 0%, transparent 48%),
    radial-gradient(ellipse at 55% 8%,  rgba(190,160,90,0.08) 0%, transparent 38%),
    radial-gradient(ellipse at 68% 92%, rgba(130,95,40,0.09)  0%, transparent 44%);
}

/* ── OVERLAY LAYER (screens + message) ── */
.layer {
  position: fixed; inset: 0; z-index: 9999;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 40px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.9s ease;
}
.layer.active {
  opacity: 1;
  pointer-events: all;
  cursor: pointer;
}

/* vignette */
.layer::after, #canvas::after {
  content: '';
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at center, transparent 50%, rgba(80,50,15,0.25) 100%);
  pointer-events: none;
  z-index: 0;
}

.t-to {
  font-family: 'Special Elite', monospace;
  font-size: 13px; color: #9a7848;
  letter-spacing: 0.24em; margin-bottom: 14px;
  position: relative; z-index: 1;
}
.t-name {
  font-family: 'Special Elite', monospace;
  font-size: 56px; color: #2a1a06;
  font-weight: normal; letter-spacing: 0.05em;
  position: relative; z-index: 1;
}
.t-instr {
  font-family: 'Special Elite', monospace;
  font-size: 15px; color: #5a4830;
  line-height: 2.1; max-width: 300px;
  letter-spacing: 0.03em;
  position: relative; z-index: 1;
}
.t-sub {
  font-family: 'Special Elite', monospace;
  font-size: 11px; color: #a8885a;
  margin-top: 22px; letter-spacing: 0.12em;
  position: relative; z-index: 1;
}
.t-tap {
  position: absolute; bottom: 36px; left: 50%;
  transform: translateX(-50%);
  font-family: 'Special Elite', monospace;
  font-size: 11px; color: #b09060;
  letter-spacing: 0.2em; z-index: 1;
  animation: pulse 2.4s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:0.2} 50%{opacity:0.85} }

/* ── CANVAS ── */
#canvas {
  position: relative; width: 100%;
  min-height: 750px; overflow: hidden; z-index: 2;
}

.memory {
  position: absolute; cursor: grab;
  touch-action: none; transition: filter 0.2s;
}
.memory:hover { filter: drop-shadow(0 5px 14px rgba(70,40,10,0.3)); }
.memory.dragging {
  cursor: grabbing; z-index: 1000;
  filter: drop-shadow(0 12px 26px rgba(70,40,10,0.38));
}
.memory.dropping {
  transition: left 0.4s cubic-bezier(0.22,1,0.36,1),
              top  0.4s cubic-bezier(0.22,1,0.36,1),
              width 0.4s ease, transform 0.4s ease;
  pointer-events: none;
}
.memory.gone {
  opacity: 0 !important;
  transform: scale(0.15) translateY(30px) !important;
  pointer-events: none;
  transition: opacity 0.35s ease, transform 0.35s cubic-bezier(0.6,0,1,0.4) !important;
}

#box-wrap {
  position: absolute; bottom: 20px;
  left: 50%; transform: translateX(-50%);
  width: 400px; height: 280px; z-index: 10;
}
#box-wrap img {
  width:100%; height:100%; object-fit:contain;
  pointer-events:none; display:block;
}
#drop-area {
  position:absolute; top:25px; left:30px;
  width:340px; height:195px; z-index:9;
}
#counter {
  position:absolute; top:18px; left:50%;
  transform:translateX(-50%);
  font-family:'Special Elite',monospace;
  font-size:11px; color:#b09050; letter-spacing:0.16em;
  pointer-events:none; z-index:3;
}
#box-wrap.pulse { animation: bp 0.3s ease; }
@keyframes bp {
  0%{transform:translateX(-50%) scale(1)}
  50%{transform:translateX(-50%) scale(1.04)}
  100%{transform:translateX(-50%) scale(1)}
}

/* ── MESSAGE CONTENT ── */
.heart {
  font-size: 20px; margin-bottom: 32px;
  color: #c4735a; font-family: Georgia, serif;
  position: relative; z-index: 1;
}
.quote {
  font-family: 'Special Elite', monospace;
  font-size: 18px; line-height: 2.2;
  color: #1e1005; max-width: 520px;
  font-weight: normal; margin-bottom: 30px;
  letter-spacing: 0.02em; min-height: 4.5em;
  position: relative; z-index: 1;
}
.sig {
  font-family: 'Special Elite', monospace;
  font-size: 13px; color: #7a5838;
  letter-spacing: 0.2em;
  opacity: 0; transition: opacity 1.4s ease;
  position: relative; z-index: 1;
}
.cursor {
  display: inline-block; width: 2px; height: 0.88em;
  background: #1e1005; vertical-align: text-bottom;
  margin-left: 1px;
  animation: blink 0.75s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
</style>
</head>
<body class="paper">

<!-- Screen 1: To Sera -->
<div class="layer paper" id="s1">
  <div class="t-to">to,</div>
  <div class="t-name">Sera</div>
  <div class="t-tap">tap to continue</div>
</div>

<!-- Screen 2: Instructions -->
<div class="layer paper" id="s2">

  <p class="t-sub">6 memories waiting</p>
  <div class="t-tap">tap to begin</div>
</div>

function loadVoice() {
  if (voiceBuffer) return;
  try {
    const ctx = getCtx();
    const bin = atob(VOICE_B64);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    ctx.decodeAudioData(bytes.buffer, buf => { voiceBuffer = buf; });
  } catch(e) { console.warn('voice load:', e); }
}

function playVoice() {
  loadVoice();
  const ctx = getCtx();
  const check = () => {
    if (voiceBuffer) {
      const src = ctx.createBufferSource();
      src.buffer = voiceBuffer;
      const gain = ctx.createGain();
      gain.gain.value = 1.0;
      src.connect(gain);
      gain.connect(ctx.destination);
      src.start(0);
    } else {
      setTimeout(check, 80);
    }
  };
  check();
}

// ─────────────────────────────────────────
// PIANO NOTES
// ─────────────────────────────────────────
const NOTES = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25];
let noteIdx = 0;

function playNote() {
  const ctx = getCtx();
  const freq = NOTES[noteIdx % NOTES.length];
  noteIdx++;
  const now = ctx.currentTime;

  const master = ctx.createGain();
  master.gain.setValueAtTime(0, now);
  master.gain.linearRampToValueAtTime(0.16, now + 0.012);
  master.gain.exponentialRampToValueAtTime(0.001, now + 2.6);
  master.connect(ctx.destination);

  [[freq, 1.0, 2.8], [freq*2, 0.22, 2.0], [freq*3, 0.06, 1.2]].forEach(([f, g, dur]) => {
    const o = ctx.createOscillator();
    o.type = 'sine'; o.frequency.value = f;
    const gn = ctx.createGain(); gn.gain.value = g;
    o.connect(gn); gn.connect(master);
    o.start(now); o.stop(now + dur);
  });
}

// ─────────────────────────────────────────
// SCREEN FLOW
// ─────────────────────────────────────────
function showLayer(id) {
  document.querySelectorAll('.layer').forEach(l => l.classList.remove('active'));
  if (id) document.getElementById(id).classList.add('active');
}

document.getElementById('s1').addEventListener('click', () => {
  getCtx(); loadVoice();       // unlock audio on first gesture
  showLayer('s2');
});

document.getElementById('s2').addEventListener('click', () => {
  showLayer(null);             // hide all overlays → show game
});

// Show s1 on load
window.addEventListener('load', () => { showLayer('s1'); });

// ─────────────────────────────────────────
// DRAG & DROP
// ─────────────────────────────────────────
const TOTAL = 6;
let placed = 0;

function isOverBox(cx, cy) {
  const r = document.getElementById('drop-area').getBoundingClientRect();
  const p = 62;
  return cx > r.left-p && cx < r.right+p && cy > r.top-p && cy < r.bottom+p;
}

function setupDrag(el) {
  let sx, sy, dragging = false;
  const pos = e => e.touches
    ? {x:e.touches[0].clientX, y:e.touches[0].clientY}
    : {x:e.clientX, y:e.clientY};

  function down(e) {
    if (el.dataset.done) return;
    e.preventDefault();
    getCtx();
    const p = pos(e), r = el.getBoundingClientRect();
    const cr = document.getElementById('canvas').getBoundingClientRect();
    sx = p.x - r.left; sy = p.y - r.top;
    el.style.left = (r.left - cr.left) + 'px';
    el.style.top  = (r.top  - cr.top)  + 'px';
    el.style.right = 'auto';
    el.style.transform = 'scale(1.07) rotate(-1.5deg)';
    el.style.zIndex = 500;
    dragging = true;
    el.classList.add('dragging');
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup',   up);
    window.addEventListener('touchmove', move, {passive:false});
    window.addEventListener('touchend',  up);
  }

  function move(e) {
    if (!dragging) return;
    e.preventDefault();
    const p = pos(e);
    const cr = document.getElementById('canvas').getBoundingClientRect();
    el.style.left = (p.x - cr.left - sx) + 'px';
    el.style.top  = (p.y - cr.top  - sy) + 'px';
  }

  function up(e) {
    if (!dragging) return;
    dragging = false;
    el.classList.remove('dragging');
    window.removeEventListener('mousemove', move);
    window.removeEventListener('mouseup',   up);
    window.removeEventListener('touchmove', move);
    window.removeEventListener('touchend',  up);
    const r = el.getBoundingClientRect();
    if (isOverBox(r.left + r.width/2, r.top + r.height/2)) drop(el);
    else { el.style.zIndex=''; el.style.transform=''; }
  }

  el.addEventListener('mousedown',  down);
  el.addEventListener('touchstart', down, {passive:false});
}

function drop(el) {
  el.dataset.done = '1';
  const bw = document.getElementById('box-wrap');
  const br = bw.getBoundingClientRect();
  const cr = document.getElementById('canvas').getBoundingClientRect();
  const tx = br.left - cr.left + br.width  * 0.5 - el.offsetWidth  * 0.25;
  const ty = br.top  - cr.top  + br.height * 0.38;

  el.classList.add('dropping');
  el.style.left = tx + 'px'; el.style.top = ty + 'px';
  el.style.zIndex = 11;
  el.style.width = Math.round(el.offsetWidth * 0.5) + 'px';
  el.style.transform = 'rotate(' + ((Math.random()-0.5)*18) + 'deg)';

  const bwEl = document.getElementById('box-wrap');
  bwEl.classList.remove('pulse');
  void bwEl.offsetWidth;
  bwEl.classList.add('pulse');

  setTimeout(playNote, 90);
  setTimeout(() => el.classList.add('gone'), 420);

  placed++;
  document.getElementById('counter').textContent = placed + ' of 6 placed';
  if (placed === TOTAL) setTimeout(revealMessage, 1300);
}

// ─────────────────────────────────────────
// REVEAL MESSAGE + TYPEWRITER
// ─────────────────────────────────────────
const FULL = 'Hold your good memories close; hold the ones you made them with closer.';
const MS_PER_CHAR = 58;

function revealMessage() {
  showLayer('msg');

  setTimeout(() => {
    // Play voice
    playVoice();

    // Typewriter
    const el = document.getElementById('quote-text');
    el.innerHTML = '';
    const cursor = document.createElement('span');
    cursor.className = 'cursor';
    el.appendChild(cursor);
    let i = 0;
    const iv = setInterval(() => {
      if (i < FULL.length) {
        el.insertBefore(document.createTextNode(FULL[i]), cursor);
        i++;
      } else {
        clearInterval(iv);
        cursor.remove();
        setTimeout(() => {
          const sig = document.getElementById('sig-text');
          sig.textContent = '— Love, Ma';
          sig.style.opacity = '1';
        }, 800);
      }
    }, MS_PER_CHAR);
  }, 600);
}

document.querySelectorAll('.memory').forEach(setupDrag);
